name: Build oled_hijack.so

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NDK r23c (newer, better clang support)
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r23c-linux.zip
          unzip -q android-ndk-r23c-linux.zip
          echo "ANDROID_NDK_HOME=${GITHUB_WORKSPACE}/android-ndk-r23c" >> $GITHUB_ENV

      - name: Build oled_hijack.so
        run: |
          export NDK=${ANDROID_NDK_HOME}
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=armv7a-linux-androideabi
          export API=19
          
          $TOOLCHAIN/bin/${TARGET}${API}-clang \
            -shared -ldl -fPIC -O2 -s \
            -D__ANDROID_API__=19 \
            -DMENU_UNLOCK -DNET_UPDOWN \
            -o oled_hijack.so \
            oled_hijack_so.c

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oled_hijack
          path: oled_hijack.so
