name: Build oled_hijack.so

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4

      - name: Install NDK
        run: |
          # Download and extract NDK directly
          wget https://dl.google.com/android/repository/android-ndk-r16b-linux-x86_64.zip
          unzip android-ndk-r16b-linux-x86_64.zip
          echo "ANDROID_NDK_HOME=${GITHUB_WORKSPACE}/android-ndk-r16b" >> $GITHUB_ENV
          echo "${GITHUB_WORKSPACE}/android-ndk-r16b" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build oled_hijack.so
        run: |
          # Using clang with Android NDK toolchain
          export NDK=${ANDROID_NDK_HOME}
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=armv7a-linux-androideabi
          export API=19
          
          $TOOLCHAIN/bin/${TARGET}${API}-clang \
            --target=arm-linux-androideabi \
            -shared -ldl -fPIC -O2 -s \
            -D__ANDROID_API__=19 \
            -DMENU_UNLOCK -DNET_UPDOWN \
            -o oled_hijack.so \
            oled_hijack_so.c

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4  # Updated to v4
        with:
          name: oled_hijack
          path: oled_hijack.so
